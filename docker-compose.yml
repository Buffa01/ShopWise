services:
  postgres:
    image: postgres:16-alpine
    container_name: shopwise-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: shopwise
      POSTGRES_PASSWORD: shopwise
      POSTGRES_DB: shopwise
    ports:
      - "5433:5432"
    volumes:
      - shopwise-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U shopwise -d shopwise"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  shopwise-postgres-data:
